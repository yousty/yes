# Aggregate Shortcuts Configuration for Dummy App
# This file defines custom abbreviations for aggregate contexts and subjects.
#
# Auto-abbreviation rules when no override is given:
#   - Multi-capital subjects/contexts: capital letters only (ContactInfo -> CI)
#   - Single-capital subjects: full subject name kept as-is (Board -> Board)
# Add an override below only when you want a shorter (or different) form than the default.
#
# Usage in Rails console:
#   T::U.new(id)        # instead of Test::User::Aggregate.new(id)
#   T::CI.new(id)       # instead of Test::ContactInfo::Aggregate.new(id)
#   Un::S.new(id)       # instead of Universe::Star::Aggregate.new(id)

contexts:
  Test: T
  Universe: Un

subjects:
  User: U
  ContactInfo: CI
  Location: Loc
  PersonalInfo: PI
  CustomResource: CR
  Star: S
